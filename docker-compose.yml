# DataBridge CRM dev stack — PHP 8.5 + PostgreSQL 16 + Redis 7.
# Usage: docker compose run --rm app php artisan migrate
#        docker compose run --rm app ./vendor/bin/pest
services:
  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    volumes:
      - ./crm:/app
      - ./plugin:/plugin:ro   # реальний код плагіна для інтеграційного тесту (plugin↔CRM)
    working_dir: /app
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_ENV: local
      # DB-конфіг береться з crm/.env (databridge). НЕ ставимо DB_DATABASE тут як реальну
      # env-змінну, бо вона перебиває phpunit-форс databridge_test → тести стирали б dev-БД.
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: database
    networks: [db]

  # Веб-сервер для перегляду в браузері: http://localhost:8000
  web:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    command: php artisan serve --host 0.0.0.0 --port 8000
    volumes:
      - ./crm:/app
    working_dir: /app
    ports:
      - "8000:8000"
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: pgsql
      DB_PORT: 5432
      DB_DATABASE: databridge
      DB_USERNAME: databridge
      DB_PASSWORD: secret
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: file
    networks: [db]

  # Обробник черги (FR-010): дренує ProcessHeartbeat → сайти переходять online.
  # Без нього heartbeat-и накопичувались би необробленими. Метрики — Horizon (Redis).
  horizon:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    command: php artisan horizon
    volumes:
      - ./crm:/app
    working_dir: /app
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_ENV: local          # обирає supervisor 'local' у config/horizon.php
      # DB-конфіг — з crm/.env (databridge), як і в app-сервісі.
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: database
    restart: unless-stopped
    networks: [db]

  pgsql:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data   # персистентність даних (інакше зникають при перестворенні)
    environment:
      POSTGRES_DB: databridge
      POSTGRES_USER: databridge
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U databridge -d databridge"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [db]

  redis:
    image: redis:7
    networks: [db]

networks:
  db:

volumes:
  pgdata:
